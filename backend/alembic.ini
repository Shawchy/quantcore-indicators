# TickFlow Quant Trading System - Alembic Database Migration Configuration
# =============================================================================

[alembic]
# Migration scripts location
script_location = %(here)s/alembic

# Migration file name template (add date prefix for easy sorting)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Add to sys.path
prepend_sys_path = .

# Timezone setting
# timezone = Asia/Shanghai

# Path separator
path_separator = os

# Database URL will be configured dynamically in env.py
# sqlalchemy.url = configured in env.py from project settings

[post_write_hooks]
# Hooks after migration script generation

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
